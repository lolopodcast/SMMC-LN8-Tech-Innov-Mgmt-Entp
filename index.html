  const hostname = window.location.hostname;
  const isPreviewSandbox = hostname.includes('sandbox') || hostname.includes('preview') || hostname.includes('googleusercontent') || hostname.includes('cdpn.io');
  if (!allowedDomains.includes(hostname) && !isPreviewSandbox) {
    window.location.href = 'https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo';
  }

  function showCopyrightMsg() {
    let modal = document.getElementById('copyright-msg-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'copyright-msg-modal';
      modal.className = 'copyright-modal';
      modal.innerText = 'Intellectual Property of Prof. Shihmin Lo';
      document.body.appendChild(modal);
    }
    modal.style.animation = 'none';
    modal.offsetHeight; 
    modal.style.animation = 'popIn 0.3s ease-out forwards';
    modal.style.opacity = '1';
    
    if(window.copyrightTimer) clearTimeout(window.copyrightTimer);
    window.copyrightTimer = setTimeout(() => {
      let currentModal = document.getElementById('copyright-msg-modal');
      if(currentModal) {
        currentModal.style.animation = 'none'; 
        currentModal.style.opacity = '0';      
        setTimeout(() => { if (currentModal.parentNode) currentModal.parentNode.removeChild(currentModal); }, 300);
      }
    }, 2000);
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.addEventListener('dragstart', (e) => {
      if (e.target.tagName.toLowerCase() === 'img' || e.target.tagName.toLowerCase() === 'svg') e.preventDefault();
    });
    document.addEventListener('contextmenu', (e) => {
      const selection = window.getSelection().toString();
      if (selection.length === 0 || e.target.tagName.toLowerCase() === 'img' || e.target.tagName.toLowerCase() === 'svg') {
        e.preventDefault(); showCopyrightMsg();
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F12') { e.preventDefault(); showCopyrightMsg(); }
      if (e.ctrlKey && e.key.toLowerCase() === 'u') { e.preventDefault(); showCopyrightMsg(); }
      if (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(e.key.toLowerCase())) { e.preventDefault(); showCopyrightMsg(); }
    });
  });
</script>

m0_intro:"本模組專注於科技與創新策略。從創新與發明的差異、技術 S 曲線演化，到平台經濟的網路外部性與內部創業組織設計。協助你掌握在科技驅動的動態環境中，企業如何獲取並維持創新的經濟租金。",

m1_nav:"1. 創新與優勢",m1_title:"創新與競爭優勢的獲取",
m1_p1:"發明 (Invention) 是新知識或新概念的創造；創新 (Innovation) 則是將發明成功商業化。發明家經常無法從其發明中獲利，因為價值的分配取決於「獨佔性體制」(Regime of Appropriability)。",
m1_p2:"「創新者能否獲利，取決於模仿的難易程度，以及誰擁有將創新推向市場所需的互補資產。」—— David Teece",
m1_p3:"Teece 提出四大決定創新獲利的因素：智慧財產權保護（專利、版權等）、知識的隱性程度（越隱性越難模仿）、領先時間（Lead time，將技術領先轉化為市場地位），以及互補資產（製造、行銷、通路、售後服務等）。",
m1_p4:"當 IP 保護較弱且互補資產掌握在既有大企業手中時（緊密專屬性），發明者往往被迫授權或被併購；若創新者能掌控互補資產並建立領先優勢，則能成為市場的最終贏家。",
m1_cards:[
  {title:"EMI 與 CT 掃描儀",desc:"EMI 發明了 CT 掃描儀，但因缺乏全球醫療設備的行銷、銷售與服務網絡（互補資產），最終被 GE 和 Siemens 等巨頭反超並逐出市場。"},
  {title:"專利保護的侷限",desc:"除製藥和化學等少數產業外，專利往往無法有效阻止模仿（對手可迴避設計）。領先時間與互補資產通常是更可靠的保護機制。"},
  {title:"互補資產的重要性",desc:"Apple 的 iPod 並非史上第一款 MP3，但它透過 iTunes 商店、設計美學與零售通路等互補資產，成功霸佔了數位音樂市場。"},
  {title:"默會知識 (Tacit Knowledge)",desc:"無法輕易編碼為文字或圖紙的知識。高度依賴默會知識的創新，其自然模仿壁壘極高。"}
],
m1_terms:[

  {front:"Complementary Assets\n互補資產",back:"將創新成功商業化所需的額外資源，如製造能力、分銷通路、品牌聲譽和售後服務網絡。"},
  {front:"Lead Time\n領先時間",back:"創新者在競爭對手成功模仿前所擁有的時間優勢，可用來攀升學習曲線、建立品牌忠誠度。"}

m1_q:[
  {q:"發明 (Invention) 與創新 (Innovation) 的主要區別是？",opts:["發明是科技，創新是管理","發明是新概念創造，創新是將其商業化","兩者完全相同","創新必定申請專利"],ans:1,exp:"發明是新知識的產出，創新則是將這些知識轉化為具商業價值的產品或流程。"},
  {q:"EMI 的 CT 掃描儀失敗，最能說明以下哪個概念的重要性？",opts:["專利保護","先發優勢","互補資產 (Complementary Assets)","默會知識"],ans:2,exp:"EMI 擁有技術先發優勢與專利，但缺乏全球醫療市場的行銷與服務通路（互補資產），最終敗給 GE。"},
  {q:"Teece 認為，在弱智財保護且互補資產很重要的產業中，誰最容易獲利？",opts:["原始發明家","擁有互補資產的跟隨者 (Followers)","創投機構","政府"],ans:1,exp:"在這種體制下，擁有製造、行銷等互補資產的大型既有企業（通常是跟隨者）最容易攫取創新的利潤。"},
  {q:"以下哪一項不是決定創新獲利能力的四大要素之一？",opts:["智慧財產權","領先時間","政府補助","互補資產"],ans:2,exp:"Teece 的模型包含：智財保護、知識的性質（隱性/顯性）、領先時間、互補資產。"},
  {q:"專利在多數產業中無法有效保護創新的主要原因是？",opts:["申請費用太高","競爭對手容易進行「迴避設計」(Invent around)","專利局審查太慢","政府不保護"],ans:1,exp:"實證研究顯示，在多數產業中，對手能透過略微改變設計來避開專利範圍（迴避設計）。"},
  {q:"Apple iPod 的成功主要基於？",opts:["最早發明 MP3","最低的製造成本","結合 iTunes 的強大互補資產與生態系","最強的專利訴訟"],ans:2,exp:"Apple 雖非首創，但憑藉優異設計與 iTunes 生態系（互補資產）取得統治地位。"},
  {q:"什麼是「默會知識」(Tacit Knowledge)？",opts:["寫在專利說明書上的知識","必須透過實踐與經驗傳遞，難以編碼的知識","存在電腦程式中的知識","大眾皆知的常識"],ans:1,exp:"默會知識難以寫成手冊，因此對手極難輕易複製模仿。"},
  {q:"領先時間 (Lead Time) 為何重要？",opts:["可以申請更多專利","讓企業有時間攀升學習曲線並鎖定客戶","可以直接消滅對手","節省研發成本"],ans:1,exp:"領先時間本身無法阻止模仿，但它給予創新者建立品牌、降低成本與建立互補資產的寶貴窗口。"}
],

m2_nav:"2. 演化與破壞",m2_title:"技術演化與破壞性創新",
m2_p1:"技術的績效演進通常呈現 S 曲線 (S-Curve)：初期進步緩慢（基礎研究期）、隨後呈指數型成長（爆發期），最後當技術接近物理極限時，成長趨緩（成熟期）。新的技術軌跡最終會以新的 S 曲線取代舊技術。然而，企業常在成熟期過度投資於舊技術，錯失轉換時機。",
m2_p2:"Clayton Christensen 的「破壞性創新」(Disruptive Innovation) 解釋了為何優秀的企業會失敗：它們太過專注於傾聽最佳客戶的需求，持續進行「維持性創新」(Sustaining Innovation)，導致產品性能過剩。",
m2_p3:"破壞性創新通常從低階市場 (Low-end) 或新市場 (New-market) 切入。初期產品性能較差，但具備便宜、簡單、便利等新屬性。當破壞性技術的績效逐漸提升，越過主流客戶的「足夠好」(Good enough) 門檻時，便會迅速顛覆既有企業。",
m2_p4:"Henderson 與 Clark 將創新分為「元件創新」(改進單一部件) 與「架構創新」(重組元件間的連結方式)。既有企業往往在架構創新中敗北，因為其組織結構與資訊溝通管道已與舊架構深深綁定。",
m2_cards:[
  {title:"維持性 vs. 破壞性創新",desc:"維持性：改善既有產品性能（如 Intel 更快的 CPU）。破壞性：提供更簡單、便宜的替代方案（如早期的 PC 顛覆大型主機）。"},
  {title:"低階市場突破",desc:"破壞者避開主流市場的正面交鋒，專注於被既有企業忽視（因利潤率過低）的邊緣客戶，隨後逐步向上升級。"},
  {title:"Kodak 的陷阱",desc:"Kodak 其實發明了數位相機，但因為其利潤高度依賴底片（互補資產鎖定），且早期數位相機畫質差（典型的破壞性特徵），最終被顛覆。"},
  {title:"架構創新障礙",desc:"當產品架構改變（如從落地風扇變為吊扇），既有企業的部門溝通機制會失效，導致無法適應新架構的產品開發。"}
],
m2_terms:[
  {front:"Disruptive Innovation\n破壞性創新",back:"初期性能低於主流產品，但具備便宜/簡單等特質，從低階或新市場切入，最終顛覆主流市場的創新。"},
  {front:"S-Curve\n技術 S 曲線",back:"描述技術績效隨時間或工程投入的演進軌跡，經歷緩慢起步、加速成長與最終成熟飽和三個階段。"},
  {front:"Architectural Innovation\n架構創新",back:"不改變核心元件的設計，但改變元件之間連結與互動方式的創新。常令既有優勢企業措手不及。"}
],
m2_q:[
  {q:"S 曲線模型中，技術發展到後期成長趨緩的原因是？",opts:["研發經費減少","市場需求下降","技術接近其自然或物理極限","對手太多"],ans:2,exp:"當技術成熟時，受限於物理或化學極限，投入大量研發也只能獲得微小的性能提升。"},
  {q:"根據 Christensen 的理論，既有大企業為何容易被破壞性創新打敗？",opts:["因為他們技術落後","因為他們不願投資研發","因為他們過度專注於滿足最挑剔/利潤最高的現有客戶","因為他們缺乏資金"],ans:2,exp:"這被稱為「創新者的窘境」：大企業因過度理性的資源分配（傾聽現有最佳客戶），反而忽視了從低階市場崛起的威脅。"},
  {q:"破壞性創新初期的典型特徵是什麼？",opts:["性能比主流產品更好","價格昂貴、專注高階市場","性能較差，但更便宜、簡單或便利","需要極高的技術門檻"],ans:2,exp:"破壞性技術初期在主流性能指標上表現較差，但具備新的價值屬性（如體積小、便攜、便宜）。"},
  {q:"Henderson 與 Clark 定義的「架構創新」是指？",opts:["更換所有核心元件","重組現有元件之間的連結與互動方式","改變產品的外觀顏色","降低製造成本"],ans:1,exp:"架構創新維持了既有元件的核心概念，但改變了它們整合與互動的整體系統架構。"},
  {q:"Kodak 面對數位相機的失敗，最能用哪種概念解釋？",opts:["維持性創新陷阱","破壞性創新與互補資產鎖定（底片利潤）","缺乏研發能力","專利過期"],ans:1,exp:"Kodak 發明了數位相機，但因其核心獲利模式依賴底片（Razor and blades model），導致組織抗拒自我破壞。"},
  {q:"破壞性技術何時會開始大量搶占主流市場？",opts:["剛推出時","當其性能越過主流客戶的「足夠好」(Good enough) 門檻時","當政府給予補貼時","當其價格變得比舊技術貴時"],ans:1,exp:"當破壞性技術持續進步，達到主流客戶最低可接受的性能標準時，其低價/便利優勢將促發大規模替代。"},
  {q:"以下何者是典型的「維持性創新」(Sustaining Innovation)？",opts:["第一台個人電腦","第一台數位相機","Intel 推出速度更快的下一代微處理器","Airbnb 取代傳統飯店"],ans:2,exp:"Intel 提升 CPU 速度是為了滿足現有高階客戶對更高效能的需求，屬於維持性創新。"},
  {q:"為什麼既有大企業通常能在「維持性創新」的競爭中勝出？",opts:["因為他們有政府保護","因為維持性創新符合他們的既有商業模式、客戶需求與資源配置","因為對手太弱","因為他們產品便宜"],ans:1,exp:"大企業在推動維持性創新時，擁有充足資源且方向符合其現有獲利模式，因此通常能擊敗新創。"}
],

m3_nav:"3. 創新策略",m3_title:"進入時機與創新策略",
m3_p1:"制定創新策略的核心抉擇之一是「進入時機」(Timing of Entry)。市場通常將進入者分為先發者 (First-movers)、早期跟隨者 (Early followers/Fast followers) 與晚進者 (Late entrants)。",
m3_p2:"先發者優勢 (First-Mover Advantages) 包括：建立品牌忠誠度與技術領導地位、搶佔稀缺資源（如最佳零售通路或關鍵供應商）、利用轉換成本鎖定客戶，以及率先攀升經驗曲線。然而，先發者也面臨極高風險：研發成本高昂、市場需求不確定、早期技術不成熟，以及可能陷入尚未確立的主導設計 (Dominant Design) 陷阱。",
m3_p3:"快速跟隨者策略 (Fast Follower) 通常更具吸引力。跟隨者可以觀察先發者的錯誤，避免巨大的早期試錯成本，並利用更成熟的技術與確定的客戶偏好進行產品改良（如 Apple 的 iPhone 與 Google 的 Android）。",
m3_p4:"管理創新風險的關鍵在於策略彈性。實質選擇權 (Real Options) 觀點建議企業應該進行多項小規模的探索性投資，保留未來擴大投資的權利，而非一開始就將所有資源押注單一技術。此外，透過策略聯盟、合資與授權，也能有效分攤研發成本與風險。",
m3_cards:[
  {title:"先發優勢的迷思",desc:"實證研究顯示，真正的「先發者」失敗率極高。最終主導市場的往往是「早期跟隨者」，他們擁有雄厚的行銷與製造資源（互補資產）。"},
  {title:"實質選擇權 (Real Options)",desc:"將金融選擇權概念應用於研發策略。投資一個原型或先期研究，等於買入一個「買權」(Call option)，若市場明朗則行使權利（大規模投資），否則放棄（損失有限）。"},
  {title:"Apple 作為快速跟隨者",desc:"Apple 幾乎從不是第一家推出新科技的公司（MP3, 智慧型手機, 平板, 智慧手錶）。其策略是等待市場萌芽，然後以卓越的設計與使用者體驗重新定義產品。"},
  {title:"轉換成本鎖定",desc:"先發者若能建立高昂的轉換成本（如軟體學習成本、資料轉移困難），即使後進者技術更優，客戶也不願輕易轉換。"}
],
m3_terms:[
  {front:"First-Mover Advantage\n先發優勢",back:"率先進入市場所獲得的競爭優勢，包括品牌建立、資源搶佔、經驗曲線效應與客戶鎖定。"},
  {front:"Fast Follower Strategy\n快速跟隨者策略",back:"避免成為第一個測試市場的白老鼠，等先發者驗證市場需求後，迅速以改良、更成熟的產品切入並奪取市場。"},
  {front:"Real Options\n實質選擇權",back:"在高度不確定環境下，透過階段性、小規模投資保留未來選擇彈性的策略思維方法。"}
],
m3_q:[
  {q:"下列何者不是「先發優勢」(First-Mover Advantage) 的來源？",opts:["建立品牌忠誠度","搶佔稀缺資源","節省初期的市場教育與試錯成本","率先攀升經驗曲線"],ans:2,exp:"節省試錯成本與市場教育費用是「跟隨者」的優勢，先發者通常必須承擔這些高昂成本。"},
  {q:"在創新策略中，應用「實質選擇權」(Real Options) 的主要目的是？",opts:["為了炒作公司股價","在高度不確定性下，透過階段性小額投資降低風險並保留彈性","為了立刻擊敗所有競爭對手","完全外包所有研發"],ans:1,exp:"實質選擇權鼓勵企業將大投資拆解為一系列階段性決策，根據市場訊號決定是否繼續推進。"},
  {q:"Apple 在智慧型手機市場的策略最適合描述為？",opts:["絕對的先發者","早期跟隨者 / 快速跟隨者","晚進低價者","利基市場防守者"],ans:1,exp:"Apple 並非最早發明智慧型手機的企業，而是等待技術成熟後，以優異的 UI 與生態系快速跟隨並重新定義市場。"},
  {q:"先發者面臨的主要劣勢 (Disadvantages) 是什麼？",opts:["無法申請專利","面臨極高的技術不確定性與市場教育成本","無法建立品牌","無法獲得供應商支持"],ans:1,exp:"先發者最大的風險在於：投資於錯誤的技術規格（主導設計尚未確立），或花費巨資教育市場卻被對手坐享其成。"},
  {q:"如果一個產業存在極高的「轉換成本」(Switching Costs)，這對誰最有利？",opts:["先發者","晚進者","創投機構","政府"],ans:0,exp:"高轉換成本使得早期累積的客戶難以流失，這大幅放大了先發者搶佔市場份額的優勢。"},
  {q:"企業透過合資 (Joint Ventures) 進行創新研發的主要動機之一是？",opts:["為了壟斷市場","分攤高昂的研發成本與風險，並獲取互補資源","為了逃避稅務","為了降低員工薪資"],ans:1,exp:"合資與策略聯盟能讓企業結合彼此的優勢（如技術與通路），並共同分擔高昂的創新風險。"},
  {q:"實證研究對於「先發者優勢」的普遍結論為何？",opts:["先發者永遠是最終的贏家","先發者的失敗率極高，成功者常被神話，這被稱為倖存者偏差","晚進者絕不可能成功","先發者從不需要互補資產"],ans:1,exp:"許多文獻（如 Tellis & Golder 的研究）指出，我們常高估了先發優勢，因為多數失敗的先發者已被歷史遺忘。"},
  {q:"在主導設計 (Dominant Design) 尚未確立前，企業最適當的策略是？",opts:["將所有資源押注單一技術","保持技術彈性，參與標準制定，延遲大規模的專用資產投資","立刻退出市場","全面降價促銷"],ans:1,exp:"在技術規格混沌期，保持彈性與參與多項技術選項（實質選擇權）是降低風險的最佳策略。"}
],

m4_nav:"4. 標準與平台",m4_title:"標準戰役與平台生態系",
m4_p1:"在許多科技與數位市場中，產品的價值不僅取決於其本身的功能（獨立效用），更取決於「有多少其他人也在使用它」——這被稱為網路外部性 (Network Externalities) 或網路效應。",
m4_p2:"「在網路市場中，贏家通吃。建立龐大的安裝基礎 (Installed Base) 比擁有最卓越的技術更為重要。」—— 平台經濟學基本法則",
m4_p3:"網路效應推動了「主導設計」與「技術標準」的確立。市場往往會出現「傾斜點」(Tipping Point)：一旦某個技術的市佔率超過該臨界點，正回饋機制將使其迅速壟斷市場，形成贏家通吃 (Winner-take-all) 局面。這也是為何在標準戰役（如 VHS vs. Betamax，Blu-ray vs. HD-DVD）中，企業願意在初期虧本銷售，以求快速擴大市佔率。",
m4_p4:"現代科技競爭已演變為「平台生態系」的競爭。雙邊平台 (Two-sided platforms，如 iOS、Android、Uber) 必須同時吸引供給方（開發者/司機）與需求方（使用者）。跨邊網路效應 (Cross-side network effects) 意味著：更多開發者會吸引更多使用者，進而吸引更多開發者。平台包圍策略 (Platform Envelopment) 則是平台巨頭利用既有龐大用戶群，吞併相鄰市場的常見手法。",
m4_cards:[
  {title:"直接 vs. 跨邊網路效應",desc:"直接網路效應：使用者越多，對其他使用者的價值越高（如 LINE、電話）。跨邊網路效應：A 邊群體（買家）增加，會提升 B 邊群體（賣家/開發者）的價值，反之亦然（如蝦皮、App Store）。"},
  {title:"安裝基礎 (Installed Base)",desc:"已經採用該技術的用戶總數。在標準戰役中，擁有最大安裝基礎的技術，通常能吸引最多的互補品開發商，形成良性循環。"},
  {title:"VHS 擊敗 Betamax",desc:"Sony 的 Betamax 畫質較佳，但 JVC 的 VHS 開放授權並延長錄影時間，吸引了龐大的片商（互補品）與播放器製造商，最終憑藉網路效應贏得標準戰役。"},
  {title:"平台包圍 (Envelopment)",desc:"平台提供者將相鄰市場的功能整合進自己的平台中。例如 Apple 將手電筒、指南針、甚至健康追蹤功能內建於 iOS，直接摧毀了相關的獨立 App 市場。"}
],
m4_terms:[
  {front:"Network Externalities\n網路外部性",back:"一項產品或服務對使用者的價值，會隨著使用該產品的總人數增加而提升的現象。"},
  {front:"Tipping Point\n傾斜點",back:"在具備網路效應的市場中，當某技術的市佔越過此臨界點，正回饋循環將推動其成為市場絕對主導者的轉折點。"},
  {front:"Winner-Take-All\n贏家通吃市場",back:"由於強大的網路效應與高轉換成本，市場最終只會由單一或極少數標準/平台存活下來的競爭格局。"}
],
m4_q:[
  {q:"「網路外部性」(Network Externalities) 的定義是什麼？",opts:["產品必須透過網際網路銷售","產品對使用者的價值，隨使用人數的增加而上升","產品的硬體成本隨產量下降","企業的網路安全防護能力"],ans:1,exp:"網路效應的核心在於價值與「用戶基數」成正比，例如社群軟體或作業系統。"},
  {q:"在雙邊平台 (如 App Store) 中，開發者變多會吸引更多使用者，使用者變多又吸引更多開發者。這稱為什麼？",opts:["直接網路效應","規模經濟","跨邊網路效應 (Cross-side network effects)","長尾效應"],ans:2,exp:"跨邊網路效應指平台一端（如開發者）的參與，會增加對另一端（如使用者）的價值。"},
  {q:"VHS 錄影帶規格擊敗技術上略優的 Betamax，主要原因是？",opts:["VHS 的製造成本高出許多","VHS 成功建立了較大的安裝基礎與互補品生態系 (電影授權)","Sony 自動退出市場","政府規定使用 VHS"],ans:1,exp:"VHS 透過開放授權快速擴大了安裝基礎，並確保了豐富的錄影帶內容（互補品），這是標準戰役獲勝的關鍵。"},
  {q:"在具備強烈網路效應的市場中，初期的定價策略通常為何？",opts:["極高定價以回收研發成本","滲透定價甚至虧本補貼，以求快速跨越「傾斜點」(Tipping point)","按成本加成定價","根據競爭對手每日調價"],ans:1,exp:"在網路效應市場中，初期市佔率決定了生死。企業常以免費或補貼策略快速擴大安裝基礎。"},
  {q:"所謂的「平台包圍」(Platform Envelopment) 策略是指？",opts:["平台將相鄰或獨立市場的服務整合進自身系統，吸收其價值","平台阻止任何人加入","企業被競爭對手併購","建立實體的辦公平台"],ans:0,exp:"例如微軟將瀏覽器 (IE) 綁定進 Windows，或 Apple 將各種小工具功能內建，即為平台包圍。"},
  {q:"在標準戰役中，「贏家通吃」(Winner-take-all) 局面最常發生在什麼情況下？",opts:["產品沒有任何互補品時","當市場存在強大的網路外部性與高轉換成本時","所有企業技術完全相同時","政府進行價格管制時"],ans:1,exp:"強大的網路效應會產生正回饋循環，強者越強，最終導致單一標準壟斷市場。"},
  {q:"技術的總價值通常由哪兩部分組成？",opts:["獨立效用價值 + 網路外部性價值","製造成本 + 行銷成本","軟體價值 + 硬體價值","專利價值 + 品牌價值"],ans:0,exp:"總價值 = 技術本身的獨立效用 (Standalone utility) + 來自龐大用戶群與互補品的網路外部性價值 (Network externalities value)。"},
  {q:"企業為何在標準戰役中經常選擇「開放授權」(Open Licensing) 策略？",opts:["因為他們不想賺錢","為了放棄智財權","為了快速擴大安裝基礎 (Installed Base) 並推動技術成為業界標準","為了讓員工高興"],ans:2,exp:"開放授權雖犧牲部分獨佔利潤，但能吸引眾多製造商加入，加速技術成為主導標準。"}
],

m5_nav:"5. 創新組織",m5_title:"創新組織與內部創業",
m5_p1:"創新與日常營運之間存在根本的張力：營運追求效率、標準化與減少變異；創新則需要探索、實驗與容忍失敗。如何在同一組織內兼顧這兩者，被稱為「組織雙元性」(Organizational Ambidexterity)。",
m5_p2:"為克服大型組織的官僚慣性，企業發展出多種創新組織設計。臭鼬工廠 (Skunk Works) 是一種將創新團隊與主組織實體隔離的模式，賦予極高自主權與專屬資源，以突破常規開發突破性產品（如 Lockheed Martin 的戰機研發）。",
m5_p3:"跨功能團隊 (Cross-functional Teams) 則是打破部門穀倉 (Silos)，將 R&D、行銷、製造等部門人員整合，能大幅縮短新產品開發時間並確保產品符合市場需求。此外，內部創業 (Corporate Venturing) 透過設立內部創投基金或孵化器，鼓勵員工提出顛覆性點子並給予資源支持。",
m5_p4:"「開放式創新」(Open Innovation) 由 Henry Chesbrough 提出，主張企業不應將研發侷限於內部。企業應主動引進外部的知識、技術與點子，同時也將內部未使用的技術對外授權。從「閉門造車」轉向「生態系共創」。",
m5_cards:[
  {title:"結構性雙元性",desc:"將核心事業（負責利用/效率）與創新事業（負責探索/新領域）在組織結構上分離，兩者擁有不同的 KPI 與文化，但由高層進行戰略整合。"},
  {title:"臭鼬工廠 (Skunk Works)",desc:"起源於洛克希德馬丁。將一小群菁英隔離於日常官僚體制外，去除繁文縟節，專注於高度機密與突破性的技術開發。"},
  {title:"開放式創新",desc:"P&G (寶僑) 透過 Connect + Develop 平台，將內部研發與外部發明家連結，成功將外部創新比例從 15% 提升至 50% 以上。"},
  {title:"內部創業 (Intrapreneurship)",desc:"在大型企業內部建立類似新創公司的機制。如 Google 的「20% 時間」政策，孕育了 Gmail 與 Google News 等創新產品。"}
],
m5_terms:[
  {front:"Organizational Ambidexterity\n組織雙元性",back:"組織同時執行「探索」(Exploration，創新與新技術) 與「利用」(Exploitation，效率與既有業務) 的能力。"},
  {front:"Open Innovation\n開放式創新",back:"企業跨越組織邊界，主動整合內部與外部的想法、技術與路徑來推動創新的模式。"},
  {front:"Cross-functional Teams\n跨功能團隊",back:"由不同專業領域（如研發、工程、行銷）成員組成的團隊，旨在加速新產品開發並減少部門間的溝通摩擦。"}
],
m5_q:[
  {q:"「組織雙元性」(Organizational Ambidexterity) 是指企業具備什麼能力？",opts:["能同時在國內與國外市場賺錢","能同時進行「探索」(創新) 與「利用」(效率)","能同時製造軟體與硬體","管理階層擁有雙重國籍"],ans:1,exp:"雙元性指組織能平衡開發新機會（探索）與優化現有業務（利用）這兩種截然不同的活動。"},
  {q:"「臭鼬工廠」(Skunk Works) 的核心設計理念是什麼？",opts:["增加組織的官僚層級","將創新團隊與母組織隔離，賦予高度自主權以突破常規","把辦公室建在有異味的地方","完全裁撤研發部門"],ans:1,exp:"臭鼬工廠透過隔離與賦權，保護創新團隊免受大企業繁文縟節與既有利益結構的干擾。"},
  {q:"Henry Chesbrough 提出的「開放式創新」(Open Innovation) 主張：",opts:["所有專利都應該免費公開","企業應打破邊界，主動利用外部知識並向外授權內部技術","研發只能在內部進行，防止機密外洩","不需要研發部門"],ans:1,exp:"開放式創新認為，在這個知識分散的時代，最聰明的人不一定都在你的公司裡，必須擁抱外部生態系。"},
  {q:"企業設立「跨功能團隊」(Cross-functional Teams) 的主要效益是？",opts:["減少員工總數","打破部門穀倉 (Silos)，加速新產品開發週期並確保產品可行性","統一員工的服裝規定","增加會議的次數"],ans:1,exp:"結合研發、製造、行銷人員，可以在設計初期就考量到量產與市場需求，避免反覆修改。"},
  {q:"Google 著名的「20% 時間」政策是哪種概念的實踐？",opts:["開放式創新","內部創業 (Intrapreneurship) / 鼓勵自下而上的探索","結構性雙元性","維持性創新"],ans:1,exp:"允許員工將部分工時用於自己有熱情的創新專案，是激發內部創業精神的經典機制。"},
  {q:"在大型企業中，為何突破性創新 (Radical Innovation) 經常面臨內部阻力？",opts:["因為員工太笨","因為它可能威脅或蠶食 (Cannibalize) 既有的核心產品與利潤結構","因為突破性創新通常成本極低","因為政府禁止大企業創新"],ans:1,exp:"突破性創新常與公司目前的金雞母相衝突，導致擁有資源的部門主管不願支持。"},
  {q:"P&G 的 Connect + Develop 戰略是哪個概念的成功案例？",opts:["封閉式創新","開放式創新 (Open Innovation)","成本削減策略","垂直整合"],ans:1,exp:"P&G 透過此平台廣泛尋求外部發明家的點子，將內部研發與外部創新完美結合。"},
  {q:"「結構性雙元性」(Structural Ambidexterity) 的解決方案是？",opts:["讓每個人每天早上做營運，下午做創新","建立完全獨立的探索部門與利用部門，兩者擁有不同的文化，由高層整合","完全放棄既有業務，只做創新","把創新工作外包給競爭對手"],ans:1,exp:"透過組織結構上的實體分離，保護創新單位不被營運單位的效率邏輯所扼殺。"}
],

m1_nav:"1. Innovation & Advantage",m1_title:"Capturing Competitive Advantage from Innovation",
m1_p1:"Invention is the creation of new products or processes; Innovation is the commercialization of an invention. Inventors often fail to profit from their inventions because value distribution depends on the 'Regime of Appropriability'.",
m1_p2:"\"Whether an innovator wins depends on how easily the innovation can be imitated and who owns the complementary assets required to commercialize it.\" — David Teece",
m1_p3:"Teece identifies four factors determining innovation profitability: Intellectual Property (IP) protection, the nature of knowledge (tacit is harder to imitate), Lead Time (translating early leads into market position), and Complementary Assets (manufacturing, marketing, distribution, etc.).",
m1_p4:"When IP protection is weak and complementary assets are held by incumbents (tight appropriability), inventors are often forced to license or sell. If innovators can control complementary assets and build a lead time, they emerge as ultimate winners.",
m1_cards:[
  {title:"EMI & the CT Scanner",desc:"EMI invented the CT scanner but lacked global medical equipment marketing and service networks (complementary assets). They were ultimately driven out by giants like GE and Siemens."},
  {title:"Limits of Patents",desc:"Except in pharmaceuticals and chemicals, patents often fail to prevent imitation (rivals can invent around). Lead time and complementary assets are usually more reliable protections."},
  {title:"Power of Complementary Assets",desc:"Apple's iPod wasn't the first MP3 player, but it dominated digital music through its complementary assets: the iTunes store, design aesthetics, and retail channels."},
  {title:"Tacit Knowledge",desc:"Knowledge that cannot be easily codified into manuals or blueprints. Innovations highly dependent on tacit knowledge naturally possess high barriers to imitation."}
],
m1_terms:[
  {front:"Regime of Appropriability",back:"The environmental conditions that determine how much value an innovator can capture from their innovation. Includes IP strength and knowledge tacitness."},
  {front:"Complementary Assets",back:"Additional resources and capabilities required to successfully commercialize an innovation, such as manufacturing, distribution channels, and brand reputation."},
  {front:"Lead Time",back:"The time advantage an innovator has before competitors can successfully imitate, used to climb the learning curve and build brand loyalty."}
],
m1_q:[
  {q:"What is the main difference between Invention and Innovation?",opts:["Invention is tech, Innovation is mgmt","Invention is creating a concept; Innovation is commercializing it","They are exactly the same","Innovation requires a patent"],ans:1,exp:"Invention is generating new knowledge; Innovation is transforming that knowledge into commercial value."},
  {q:"EMI's failure with the CT scanner best illustrates the importance of?",opts:["Patent protection","First-mover advantage","Complementary Assets","Tacit knowledge"],ans:2,exp:"EMI had the technology and patents but lacked the global marketing/service networks (complementary assets), losing to GE."},
  {q:"According to Teece, in a regime with weak IP and critical complementary assets, who profits most?",opts:["The original inventor","Followers possessing complementary assets","Venture capitalists","The government"],ans:1,exp:"In such regimes, large incumbents (often followers) who control manufacturing and distribution capture the lion's share of profits."},
  {q:"Which is NOT one of the four elements determining innovation profitability?",opts:["Intellectual property","Lead time","Government subsidies","Complementary assets"],ans:2,exp:"Teece's model includes: IP protection, nature of knowledge (tacitness), lead time, and complementary assets."},
  {q:"Why do patents fail to protect innovations in many industries?",opts:["Too expensive","Competitors can easily 'invent around' the patent","Patent office is too slow","Governments don't protect them"],ans:1,exp:"Empirical research shows rivals can often legally bypass patents by slightly altering designs (inventing around)."},
  {q:"Apple iPod's success was primarily based on?",opts:["Inventing the first MP3","Lowest manufacturing cost","Combining great design with powerful complementary assets (iTunes)","Aggressive patent lawsuits"],ans:2,exp:"Apple wasn't first, but won by leveraging superior design and a seamless ecosystem (complementary assets)."},
  {q:"What is 'Tacit Knowledge'?",opts:["Knowledge written in patents","Knowledge that is hard to codify and must be transferred through practice","Knowledge stored in code","Common sense"],ans:1,exp:"Tacit knowledge resists codification, making it extremely difficult for competitors to easily copy or imitate."},
  {q:"Why is Lead Time important?",opts:["To file more patents","Gives firms time to climb the learning curve and lock in customers","Instantly destroys rivals","Saves R&D costs"],ans:1,exp:"Lead time doesn't prevent imitation permanently, but gives innovators a crucial window to build brand and lower costs."}
],

m2_nav:"2. Tech Evolution",m2_title:"Tech Evolution & Disruptive Innovation",
m2_p1:"Technology performance usually evolves along an S-Curve: initial slow progress, followed by exponential growth, and finally plateauing as physical limits are reached. A new technological trajectory eventually replaces the old via a new S-curve. However, firms often overinvest in mature tech, missing the transition window.",
m2_p2:"Clayton Christensen's 'Disruptive Innovation' explains why great firms fail: they focus too much on their best customers, delivering 'Sustaining Innovations' that eventually overshoot mainstream market needs.",
m2_p3:"Disruptive innovations usually enter from the low-end or new-markets. Initially inferior in mainstream performance, they offer new attributes like being cheaper, simpler, or more convenient. As their performance improves and crosses the 'good enough' threshold, they rapidly overthrow incumbents.",
m2_p4:"Henderson & Clark divide innovation into 'Component Innovation' (improving single parts) and 'Architectural Innovation' (reconfiguring how components link together). Incumbents often fail at architectural innovation because their org structures and communication channels are deeply tied to the old architecture.",
m2_cards:[
  {title:"Sustaining vs. Disruptive",desc:"Sustaining: Improves performance for existing customers (e.g., faster Intel CPU). Disruptive: Cheaper/simpler alternatives targeting overlooked segments (e.g., early PCs vs mainframes)."},
  {title:"Low-end Foothold",desc:"Disruptors avoid head-on battles, targeting marginal customers ignored by incumbents (due to low margins), then relentlessly move upmarket."},
  {title:"The Kodak Trap",desc:"Kodak actually invented the digital camera but was disrupted because its profits relied heavily on film (complementary asset lock-in) and early digital cameras had poor resolution (classic disruptive trait)."},
  {title:"Architectural Innovation Barrier",desc:"When architecture changes (e.g., floor fan to ceiling fan), incumbent communication channels break down, preventing them from developing new architectural products efficiently."}
],
m2_terms:[
  {front:"Disruptive Innovation",back:"Innovations initially inferior in mainstream performance but cheaper/simpler, entering from low-end/new markets, eventually displacing mainstream products."},
  {front:"S-Curve",back:"The trajectory of tech performance over time/effort, characterized by slow start, rapid acceleration, and eventual maturity/saturation."},
  {front:"Architectural Innovation",back:"Innovation that changes how components link and interact without necessarily changing the core design of the components themselves."}
],
m2_q:[
  {q:"In the S-Curve model, why does tech progress plateau at the end?",opts:["Decreased R&D funding","Falling market demand","Technology approaches its natural/physical limits","Too many competitors"],ans:2,exp:"As tech matures, it hits physical/chemical limits, meaning massive R&D yields only marginal improvements."},
  {q:"According to Christensen, why do great incumbent firms get disrupted?",opts:["They lag in tech","They refuse to spend on R&D","They focus too heavily on satisfying their most profitable, demanding customers","They lack capital"],ans:2,exp:"Known as the Innovator's Dilemma: rational resource allocation (listening to best customers) causes them to ignore low-end threats."},
  {q:"What is a typical characteristic of early disruptive innovations?",opts:["Better performance than mainstream products","Expensive, targeting high-end","Inferior performance, but cheaper, simpler, or more convenient","Requires extreme tech barriers"],ans:2,exp:"Disruptive tech initially underperforms on mainstream metrics but offers new value like portability or low cost."},
  {q:"Henderson & Clark's 'Architectural Innovation' refers to?",opts:["Replacing all core components","Reconfiguring how existing components link and interact","Changing product color","Lowering manufacturing costs"],ans:1,exp:"Architectural innovation keeps core component concepts but changes the overall system architecture of how they integrate."},
  {q:"Kodak's failure with digital cameras is best explained by?",opts:["Sustaining innovation trap","Disruptive innovation & complementary asset lock-in (film profits)","Lack of R&D capability","Expired patents"],ans:1,exp:"Kodak invented digital cameras but organizational resistance (protecting high-margin film business) hindered its adaptation."},
  {q:"When does disruptive tech rapidly capture the mainstream market?",opts:["Upon launch","When its performance crosses the 'good enough' threshold for mainstream customers","When subsidized by government","When it becomes more expensive"],ans:1,exp:"Once disruptive tech improves enough to meet mainstream minimum acceptable standards, its cost/convenience advantage triggers mass substitution."},
  {q:"Which is a classic 'Sustaining Innovation'?",opts:["First personal computer","First digital camera","Intel launching a faster next-gen microprocessor","Airbnb disrupting hotels"],ans:2,exp:"Intel making a faster CPU to satisfy existing high-end customer demands is a sustaining innovation."},
  {q:"Why do incumbents usually win 'Sustaining Innovation' battles?",opts:["Government protection","It aligns with their existing business model, customer needs, and resources","Competitors are too weak","Their products are cheaper"],ans:1,exp:"Incumbents have the resources and motivation to win sustaining battles because it serves their current profit model perfectly."}
],

m3_nav:"3. Innovation Strategy",m3_title:"Entry Timing & Innovation Strategy",
m3_p1:"A core strategic choice in innovation is the 'Timing of Entry'. Entrants are typically categorized as First-movers, Early followers (Fast followers), and Late entrants.",
m3_p2:"First-Mover Advantages include: brand loyalty, preempting scarce resources (retail channels, key suppliers), exploiting switching costs to lock in customers, and leading the experience curve. However, first-movers face immense risks: high R&D costs, demand uncertainty, immature tech, and investing in a standard before a Dominant Design emerges.",
m3_p3:"The Fast Follower strategy is often more attractive. Followers avoid massive early trial-and-error costs by observing first-movers' mistakes, entering with optimized tech and clearer customer preferences (e.g., Apple's iPhone or Google's Android).",
m3_p4:"Managing innovation risk requires strategic flexibility. The Real Options perspective suggests firms make multiple small, exploratory investments, retaining the right to scale up later, rather than betting everything on one tech early on. Strategic alliances, JVs, and licensing also help share R&D costs and risks.",
m3_cards:[
  {title:"The First-Mover Myth",desc:"Empirical studies show true 'first-movers' have huge failure rates. Markets are often ultimately dominated by 'early followers' who possess deep marketing/manufacturing resources (complementary assets)."},
  {title:"Real Options",desc:"Applying financial option concepts to R&D. Investing in a prototype is buying a 'call option'; if the market clears, exercise it (scale up); if not, abandon it with limited loss."},
  {title:"Apple as a Fast Follower",desc:"Apple is rarely the first to invent a tech category (MP3, smartphone, smartwatch). Its strategy is to wait for the market to sprout, then redefine it with superior design and UX."},
  {title:"Switching Cost Lock-in",desc:"If a first-mover establishes high switching costs (e.g., software learning curves, data transfer hurdles), customers won't switch easily even if latecomers offer better tech."}
],
m3_terms:[
  {front:"First-Mover Advantage",back:"Competitive advantages gained by being the first to enter a market, including brand equity, resource preemption, and switching cost lock-in."},
  {front:"Fast Follower Strategy",back:"Avoiding being the market's guinea pig; waiting for first-movers to validate demand, then rapidly entering with refined, mature products."},
  {front:"Real Options",back:"A strategic mindset of making phased, small-scale investments under high uncertainty to retain future flexibility and limit downside risk."}
],
m3_q:[
  {q:"Which is NOT a typical First-Mover Advantage?",opts:["Building brand loyalty","Preempting scarce resources","Saving on early market education and trial-and-error costs","Leading the experience curve"],ans:2,exp:"Saving on trial-and-error and market education is a 'follower' advantage. First-movers usually bear these heavy costs."},
  {q:"What is the primary purpose of applying 'Real Options' in innovation strategy?",opts:["To inflate stock prices","To reduce risk and retain flexibility via phased, small-scale investments under high uncertainty","To instantly defeat all rivals","To outsource all R&D"],ans:1,exp:"Real options encourage breaking large investments into phased decisions, proceeding based on market signals."},
  {q:"Apple's strategy in the smartphone market is best described as:",opts:["Absolute first-mover","Early follower / Fast follower","Late low-cost entrant","Niche defender"],ans:1,exp:"Apple wasn't the first to make a smartphone; it waited for tech to mature and fast-followed with superior UI and ecosystem."},
  {q:"What is a major disadvantage faced by First-Movers?",opts:["Inability to file patents","Extreme tech uncertainty and high market education costs","Inability to build brands","No supplier support"],ans:1,exp:"The biggest risk is investing heavily in the wrong tech standards (before dominant design) and paying to educate the market for followers."},
  {q:"If an industry features extreme 'Switching Costs', who benefits most?",opts:["First-movers","Late entrants","Venture capitalists","Governments"],ans:0,exp:"High switching costs prevent early-acquired customers from churning, heavily amplifying first-mover market share advantages."},
  {q:"A major motive for using Joint Ventures (JVs) in R&D is?",opts:["To monopolize the market","To share high R&D costs/risks and access complementary resources","To evade taxes","To lower employee wages"],ans:1,exp:"JVs and alliances allow firms to combine strengths (e.g., tech + distribution) while sharing the heavy burden of innovation risks."},
  {q:"What is the general empirical conclusion regarding 'First-Mover Advantage'?",opts:["First-movers always win","First-mover failure rates are extremely high; successes are often mythologized (survivorship bias)","Late entrants never succeed","First-movers don't need complementary assets"],ans:1,exp:"Research (like Tellis & Golder) shows we often overestimate first-mover advantage because failed pioneers are forgotten by history."},
  {q:"Before a Dominant Design emerges, the most appropriate strategy is?",opts:["Bet all resources on a single technology","Maintain flexibility, participate in standards setting, and delay massive dedicated asset investments","Exit the market immediately","Heavy price promotions"],ans:1,exp:"During standard chaos, retaining flexibility via multiple tech options (real options) minimizes catastrophic risk."}
],

m4_nav:"4. Standards & Platforms",m4_title:"Standards Battles & Platform Ecosystems",
m4_p1:"In many tech and digital markets, a product's value depends not just on its standalone utility, but on 'how many other people are using it' — known as Network Externalities (Network Effects).",
m4_p2:"\"In network markets, winner takes all. Building a massive Installed Base is often more critical than having the absolute best technology.\" — Platform Economics Principle",
m4_p3:"Network effects drive the establishment of Dominant Designs. Markets often exhibit a 'Tipping Point': once a tech's market share crosses this threshold, positive feedback loops rapidly propel it to a monopoly, creating a Winner-take-all dynamic. This is why firms in standards battles (VHS vs Betamax, Blu-ray vs HD-DVD) often sell initial products at a loss to rapidly expand market share.",
m4_p4:"Modern tech competition has evolved into 'Platform Ecosystems'. Two-sided platforms (iOS, Android, Uber) must attract both the supply side (developers/drivers) and demand side (users). Cross-side network effects mean more developers attract more users, which in turn attracts more developers. Platform Envelopment is a common tactic where a platform giant leverages its massive user base to swallow adjacent markets.",
m4_cards:[
  {title:"Direct vs Cross-Side Network Effects",desc:"Direct: Value increases with more of the same users (e.g., Telephone, LINE). Cross-side: Increase in group A (buyers) raises value for group B (sellers/developers) and vice versa (e.g., App Store)."},
  {title:"Installed Base",desc:"The total number of users who have already adopted a technology. In standards battles, the tech with the largest installed base attracts the most complementary goods, creating a virtuous cycle."},
  {title:"VHS beating Betamax",desc:"Sony's Betamax had slightly better quality, but JVC's VHS used open licensing and longer recording times to attract huge numbers of movie studios (complements) and makers, winning via network effects."},
  {title:"Platform Envelopment",desc:"A platform provider integrates functions of adjacent markets into its own platform. E.g., Apple building flashlight, compass, and health tracking into iOS, destroying standalone app markets for those functions."}
],
m4_terms:[
  {front:"Network Externalities",back:"A phenomenon where the value of a product or service to a user increases as the total number of users of that product grows."},
  {front:"Tipping Point",back:"The critical threshold in a network market where a technology's market share triggers a positive feedback loop, propelling it to absolute dominance."},
  {front:"Winner-Take-All",back:"A competitive landscape where strong network effects and high switching costs result in only one or very few standards/platforms surviving."}
],
m4_q:[
  {q:"What defines 'Network Externalities'?",opts:["Products must be sold over the internet","The product's value to a user increases as the total number of users increases","Hardware costs drop with volume","A firm's cybersecurity capability"],ans:1,exp:"The core of network effects is that value scales with the 'user base' (e.g., social media, operating systems)."},
  {q:"In two-sided platforms (like App Store), more developers attract users, which attracts more developers. This is called:",opts:["Direct network effects","Economies of scale","Cross-side network effects","Long-tail effects"],ans:2,exp:"Cross-side network effects occur when participation on one side of the platform increases value for the other side."},
  {q:"Why did VHS defeat the technically superior Betamax?",opts:["VHS was much more expensive to make","VHS built a larger installed base and complementary goods ecosystem (movies)","Sony voluntarily withdrew","Government mandated VHS"],ans:1,exp:"VHS used open licensing to rapidly grow its installed base and secure rich movie content (complements), winning the standards battle."},
  {q:"In markets with strong network effects, what is the typical initial pricing strategy?",opts:["Extremely high pricing to recover R&D","Penetration pricing or subsidizing losses to rapidly cross the 'Tipping Point'","Cost-plus pricing","Matching competitor daily prices"],ans:1,exp:"In network markets, early market share dictates survival. Firms often use free or subsidized pricing to rapidly expand their installed base."},
  {q:"What is 'Platform Envelopment'?",opts:["A platform integrating services from adjacent markets to absorb their value","A platform blocking anyone from joining","A firm being acquired by a rival","Building a physical office platform"],ans:0,exp:"For example, Microsoft bundling IE into Windows, or Apple building widget functions natively into iOS, destroying standalone competitors."},
  {q:"When does a 'Winner-take-all' dynamic most commonly occur?",opts:["When the product has no complements","When the market features strong network externalities and high switching costs","When all firm tech is identical","Under government price controls"],ans:1,exp:"Strong network effects create positive feedback loops (rich get richer), ultimately leading a single standard to monopolize the market."},
  {q:"A technology's total value usually comprises which two parts?",opts:["Standalone utility value + Network externalities value","Manufacturing cost + Marketing cost","Software value + Hardware value","Patent value + Brand value"],ans:0,exp:"Total Value = Standalone utility of the tech itself + Network externalities value derived from the user base and complementary goods."},
  {q:"Why do firms often choose 'Open Licensing' in standards battles?",opts:["They hate making money","To abandon IP rights","To rapidly expand the Installed Base and push the tech to become the industry standard","To make employees happy"],ans:2,exp:"Open licensing sacrifices some monopoly profit but attracts numerous manufacturers, accelerating the tech's path to becoming the dominant standard."}
],

m5_nav:"5. Org & Entrepreneurship",m5_title:"Organizing for Innovation & Corporate Venturing",
m5_p1:"A fundamental tension exists between innovation and daily operations: operations seek efficiency, standardization, and variance reduction; innovation requires exploration, experimentation, and tolerance for failure. Balancing both within the same firm is called 'Organizational Ambidexterity'.",
m5_p2:"To overcome large corporate bureaucratic inertia, firms developed various innovative org designs. 'Skunk Works' isolate innovation teams physically from the main organization, granting high autonomy and dedicated resources to bypass red tape and develop breakthrough products (e.g., Lockheed Martin's fighter jets).",
m5_p3:"Cross-functional Teams break down departmental silos, integrating R&D, marketing, and manufacturing personnel to drastically shorten product development cycles and ensure market fit. Furthermore, Corporate Venturing (internal incubators/VC funds) encourages employees to pitch disruptive ideas with dedicated backing.",
m5_p4:"'Open Innovation', coined by Henry Chesbrough, argues firms shouldn't restrict R&D internally. Firms should actively pull in external knowledge, tech, and ideas, while licensing out unused internal tech. A shift from 'closed-door R&D' to 'ecosystem co-creation'.",
m5_cards:[
  {title:"Structural Ambidexterity",desc:"Structurally separating the core business (exploitation/efficiency) from the innovation business (exploration/new areas) with different KPIs and cultures, integrated only at the top management level."},
  {title:"Skunk Works",desc:"Originating from Lockheed Martin. Isolating a small elite team from daily bureaucracy, removing red tape, and focusing purely on highly classified, breakthrough tech development."},
  {title:"Open Innovation",desc:"P&G's 'Connect + Develop' platform connected internal R&D with external inventors, successfully raising the ratio of externally-sourced innovations from 15% to over 50%."},
  {title:"Intrapreneurship",desc:"Creating startup-like mechanisms within a large corporation. E.g., Google's '20% time' policy, which birthed innovative products like Gmail and Google News."}
],
m5_terms:[
  {front:"Organizational Ambidexterity",back:"The ability of an organization to simultaneously execute 'Exploration' (innovation/new tech) and 'Exploitation' (efficiency/existing business)."},
  {front:"Open Innovation",back:"A paradigm where firms span organizational boundaries to actively integrate internal and external ideas, tech, and paths to drive innovation."},
  {front:"Cross-functional Teams",back:"Teams comprising members from diverse functional areas (R&D, engineering, marketing) designed to accelerate product development and reduce inter-department friction."}
],
m5_q:[
  {q:"What capability does 'Organizational Ambidexterity' refer to?",opts:["Making money domestically and internationally simultaneously","Simultaneously conducting 'Exploration' (innovation) and 'Exploitation' (efficiency)","Manufacturing hardware and software simultaneously","Management holding dual citizenship"],ans:1,exp:"Ambidexterity is balancing the exploration of new opportunities with the exploitation (optimization) of existing businesses."},
  {q:"What is the core design philosophy of 'Skunk Works'?",opts:["Adding bureaucratic layers","Isolating innovation teams from the parent org with high autonomy to break routine norms","Building offices in smelly locations","Eliminating the R&D department"],ans:1,exp:"Skunk works protect innovation teams from large corporate red tape and existing vested interests via isolation and empowerment."},
  {q:"Henry Chesbrough's 'Open Innovation' argues that:",opts:["All patents should be free","Firms should break boundaries, actively utilizing external knowledge and licensing out internal tech","R&D must only be internal to prevent leaks","R&D departments are unnecessary"],ans:1,exp:"Open innovation recognizes that in a distributed knowledge era, the smartest people don't all work for you; you must embrace the external ecosystem."},
  {q:"What is the primary benefit of 'Cross-functional Teams'?",opts:["Reducing total headcount","Breaking departmental silos to accelerate product development and ensure viability","Standardizing dress codes","Increasing meeting frequency"],ans:1,exp:"Integrating R&D, manufacturing, and marketing early ensures manufacturability and market fit, avoiding costly late-stage revisions."},
  {q:"Google's famous '20% Time' policy is a practice of what concept?",opts:["Open Innovation","Intrapreneurship / Encouraging bottom-up exploration","Structural Ambidexterity","Sustaining Innovation"],ans:1,exp:"Allowing employees to spend part of their time on passionate innovation projects is a classic mechanism to spark corporate entrepreneurship."},
  {q:"Why does Radical Innovation often face heavy internal resistance in large firms?",opts:["Employees lack intelligence","It threatens or cannibalizes existing core products and profit structures","Radical innovation is too cheap","Government bans large firm innovation"],ans:1,exp:"Breakthrough innovations often conflict with the company's current 'cash cows,' causing resource-controlling managers to withhold support."},
  {q:"P&G's Connect + Develop strategy is a successful example of?",opts:["Closed Innovation","Open Innovation","Cost Reduction Strategy","Vertical Integration"],ans:1,exp:"P&G used this platform to extensively source ideas from external inventors, perfectly blending internal R&D with external innovation."},
  {q:"What is the solution offered by 'Structural Ambidexterity'?",opts:["Everyone does operations in the morning, innovation in the afternoon","Establishing completely independent explore and exploit units with different cultures, integrated at the top","Abandoning existing business entirely for innovation","Outsourcing innovation to rivals"],ans:1,exp:"Through physical structural separation, innovation units are protected from being suffocated by the efficiency logic of operational units."}
],

/* ═══════ FLIP CARD ═══════ */
const FlipCard = ({ front, back, t }) => {
  const [flipped, setFlipped] = useState(false);
  return (
    <div className="perspective cursor-pointer h-36 select-none" onClick={() => setFlipped(!flipped)}>
      <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped ? 'rotate-y-180' : ''}`}>
        <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
          <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5] text-sm leading-snug whitespace-pre-line">{front}</p>
          <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
        </div>
        <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">

};

/* ═══════ MODULE QUIZ ═══════ */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() =>
    [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4)
  );
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-4 sm:p-6 border border-slate-200 dark:border-slate-700 select-none">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center"><IconBookOpen size={20} className="mr-2"/>{t.quiz_title}</h3>
      {quizIndices.map((qIdx, i) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3 text-slate-800 dark:text-slate-200">{i+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oIdx) => (
                <button key={oIdx} onClick={() => !submitted && setSelected(s => ({...s, [i]: oIdx}))}
                  className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                    ${submitted
                      ? oIdx === q.ans ? 'bg-green-100 border-green-500 dark:bg-green-900/30 dark:border-green-500 font-bold'
                        : selected[i] === oIdx ? 'bg-red-100 border-red-400 dark:bg-red-900/30 dark:border-red-400 text-red-600' : 'border-slate-200 dark:border-slate-700'
                      : selected[i] === oIdx ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/5 font-bold text-[#004030] dark:text-[#D8C3A5]' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                    } text-slate-700 dark:text-slate-300`}>
                  {opt}
                </button>
              ))}
            </div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}: {q.exp}</p>}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={() => { 
            setSubmitted(true); 
            const c = quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length; 
            onQuizSubmit(moduleId, c, quizIndices.length, questions.length); 
          }}
          disabled={Object.keys(selected).length < quizIndices.length}
          className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-all">
          {t.submit}
        </button>
      ) : (
        <div className="flex items-center gap-4">
          <p className="font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length}/{quizIndices.length}</p>
          <button onClick={() => { setSelected({}); setSubmitted(false); }}
            className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg hover:bg-[#004030]/10 transition-colors">
            {t.retry}
          </button>
        </div>
      )}
    </div>
  );
};
