/* ── FlipCard ── */
const FlipCard = ({ front, back, t }) => {
  const [flipped, setFlipped] = useState(false);
  return (
    <div className="perspective cursor-pointer h-36" onClick={() => setFlipped(!flipped)}>
      <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped ? 'rotate-y-180' : ''}`}>
        <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
          <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5]">{front}</p>
          <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
        </div>
        <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
          <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{back}</p>
        </div>
      </div>
    </div>
  );
};

/* ── ModuleQuiz ── */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [quizIndices] = useState(() =>
    [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4)
  );
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6">{t.quiz_title}</h3>
      {quizIndices.map((qIdx, i) => {
        const q = questions[qIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3">{i+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oIdx) => (
                <button key={oIdx} onClick={() => !submitted && setSelected(s => ({...s, [i]: oIdx}))}
                  className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                    ${submitted
                      ? oIdx === q.ans ? 'bg-green-100 border-green-500 dark:bg-green-900/30 dark:border-green-500'
                        : selected[i] === oIdx ? 'bg-red-100 border-red-400 dark:bg-red-900/30 dark:border-red-400' : 'border-slate-200 dark:border-slate-700'
                      : selected[i] === oIdx ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5 dark:bg-[#D8C3A5]/5' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                    }`}>
                  {opt}
                </button>
              ))}
            </div>
            {submitted && <p className="mt-2 text-sm text-slate-600 dark:text-slate-400 italic">{t.explanation}: {q.exp}</p>}
          </div>
        );
      })}
      {!submitted
        ? <button onClick={() => { setSubmitted(true); const c = quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length; onQuizSubmit(moduleId, c, quizIndices.length); }}
            disabled={Object.keys(selected).length < quizIndices.length}
            className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-all">
            {t.submit}
          </button>
        : <div className="flex items-center gap-4">
            <span className="font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {quizIndices.filter((qIdx,i) => selected[i] === questions[qIdx].ans).length}/{quizIndices.length}</span>
            <button onClick={() => { setSelected({}); setSubmitted(false); }}
              className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg">
              {t.retry}
            </button>
          </div>
      }
    </div>
  );
};

/* ── LinkCard ── */

  <a href={url} target="_blank" rel="noopener noreferrer"
    className="block bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group">

      <span className="font-bold font-serif text-sm text-[#004030] dark:text-[#D8C3A5] group-hover:underline leading-snug">{label}</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="shrink-0 opacity-40"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </div>
    <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">{desc}</p>
  </a>
);

/* ── H2 ── */
const H2 = ({ children, icon, number }) => (
  <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center gap-3">
    {icon && <span className="text-2xl">{icon}</span>}
    {number !== undefined && <span>{number}.</span>}
    <span>{children}</span>
  </h2>
);

/* ── Lab Components (top-level) ── */
const SCurveLab = ({lang}) => {
  const [effort, setEffort] = useState(50);
  const perf = 100 / (1 + Math.exp(-0.08 * (effort - 50)));
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'技術 S 曲線模擬器':'Technology S-Curve Simulator'}</h4>
      <p className="text-sm text-slate-500 mb-4">{lang==='zh'?'調整 R&D 投入，觀察技術績效的 S 型增長模式':'Adjust R&D effort to observe the S-shaped growth pattern of technology performance'}</p>
      <input type="range" min="0" max="100" value={effort} onChange={e=>setEffort(+e.target.value)} className="w-full max-w-full accent-[#004030] dark:accent-[#D8C3A5]"/>
      <div className="flex justify-between text-xs text-slate-500 mt-1"><span>{lang==='zh'?'低投入':'Low effort'}</span><span>{lang==='zh'?'高投入':'High effort'}</span></div>
      <div className="mt-4 h-48 bg-slate-50 dark:bg-slate-900 rounded-lg relative overflow-hidden">
        <svg viewBox="0 0 200 100" className="w-full h-full">
          <path d={`M0,100 ${Array.from({length:101},(_,i)=>`L${i*2},${100-100/(1+Math.exp(-0.08*(i-50)))}`).join(' ')}`} fill="none" stroke="#D8C3A5" strokeWidth="1.5" opacity="0.4"/>
          <circle cx={effort*2} cy={100-perf} r="4" fill="#004030"/>
          <line x1={effort*2} y1={100-perf} x2={effort*2} y2="100" stroke="#004030" strokeWidth="0.5" strokeDasharray="3,2" opacity="0.5"/>
        </svg>
        <div className="absolute bottom-2 right-3 bg-[#004030] text-[#D8C3A5] text-xs font-bold px-2 py-1 rounded">{lang==='zh'?'績效':'Perf'}: {perf.toFixed(1)}%</div>
      </div>
    </div>
  );
};

const InnovFunnelLab = ({lang}) => {
  const stages = lang==='zh' ? [{n:'原始構想',v:3000},{n:'提交構想',v:300},{n:'小型計畫',v:125},{n:'重大開發',v:4},{n:'產品上市',v:2},{n:'成功產品',v:1}] : [{n:'Raw Ideas',v:3000},{n:'Submitted',v:300},{n:'Small Projects',v:125},{n:'Major Dev',v:4},{n:'Launches',v:2},{n:'Success',v:1}];
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'創新漏斗':'Innovation Funnel'}</h4>
      <div className="space-y-2">
        {stages.map((s,i)=>(
          <div key={i} className="flex items-center gap-3">
            <div className="w-20 text-xs text-right text-slate-500 shrink-0">{s.n}</div>
            <div className="flex-1 bg-slate-100 dark:bg-slate-900 rounded-full h-6 overflow-hidden">
              <div className="h-full bg-gradient-to-r from-[#004030] to-[#D8C3A5] rounded-full transition-all flex items-center justify-end pr-2" style={{width:`${Math.max(Math.log10(s.v+1)/Math.log10(3001)*100,8)}%`}}>
                <span className="text-xs font-bold text-white">{s.v.toLocaleString()}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

const NetworkEffectLab = ({lang}) => {
  const [users, setUsers] = useState(10);
  const connections = users*(users-1)/2;
  const value = users * Math.log2(users+1);
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?"網路外部性模擬器":"Network Externality Simulator"}</h4>
      <p className="text-sm text-slate-500 mb-4">{lang==='zh'?'調整使用者人數，觀察 Metcalfe 定律下的網路價值變化':'Adjust user count to observe network value changes under Metcalfe\'s Law'}</p>
      <input type="range" min="2" max="100" value={users} onChange={e=>setUsers(+e.target.value)} className="w-full max-w-full accent-[#004030] dark:accent-[#D8C3A5]"/>
      <div className="grid grid-cols-3 gap-3 mt-4">
        <div className="text-center bg-slate-50 dark:bg-slate-900 rounded-lg p-3"><div className="text-xl font-black text-[#004030] dark:text-[#D8C3A5]">{users}</div><div className="text-xs text-slate-500">{lang==='zh'?'使用者':'Users'}</div></div>
        <div className="text-center bg-slate-50 dark:bg-slate-900 rounded-lg p-3"><div className="text-xl font-black text-[#004030] dark:text-[#D8C3A5]">{connections.toLocaleString()}</div><div className="text-xs text-slate-500">{lang==='zh'?'連結數':'Connections'}</div></div>
        <div className="text-center bg-slate-50 dark:bg-slate-900 rounded-lg p-3"><div className="text-xl font-black text-[#004030] dark:text-[#D8C3A5]">{value.toFixed(0)}</div><div className="text-xs text-slate-500">{lang==='zh'?'網路價值':'Network Value'}</div></div>
      </div>
    </div>
  );
};

const ApproprLab = ({lang}) => {
  const [patent, setPatent] = useState(50);
  const [lead, setLead] = useState(50);
  const [compl, setCompl] = useState(50);
  const score = (patent*0.3 + lead*0.35 + compl*0.35).toFixed(0);
  const regime = score > 65 ? (lang==='zh'?'強':'Strong') : score > 35 ? (lang==='zh'?'中':'Moderate') : (lang==='zh'?'弱':'Weak');
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{lang==='zh'?'價值獲取體制分析器':'Appropriability Regime Analyzer'}</h4>
      <div className="space-y-4">
        <div><label className="text-sm text-slate-600 dark:text-slate-400 block mb-1">{lang==='zh'?'專利保護強度':'Patent Protection'}: {patent}%</label><input type="range" min="0" max="100" value={patent} onChange={e=>setPatent(+e.target.value)} className="w-full max-w-full accent-[#004030] dark:accent-[#D8C3A5]"/></div>
        <div><label className="text-sm text-slate-600 dark:text-slate-400 block mb-1">{lang==='zh'?'領先時間':'Lead Time'}: {lead}%</label><input type="range" min="0" max="100" value={lead} onChange={e=>setLead(+e.target.value)} className="w-full max-w-full accent-[#004030] dark:accent-[#D8C3A5]"/></div>
        <div><label className="text-sm text-slate-600 dark:text-slate-400 block mb-1">{lang==='zh'?'互補性資源':'Complementary Resources'}: {compl}%</label><input type="range" min="0" max="100" value={compl} onChange={e=>setCompl(+e.target.value)} className="w-full max-w-full accent-[#004030] dark:accent-[#D8C3A5]"/></div>

};

m4_nav:"4. 標準與平台策略", m4_title:"標準、平台與網路外部性",
m4_p1:"在數位網路經濟中，越來越多市場受到技術標準的影響。對企業而言，擁有一個標準可以帶來無與倫比的競爭優勢與豐厚回報。Microsoft 的 Windows、Intel 的 x86 系列、Apple 的 iTunes 都是掌握標準帶來巨大利潤的典型案例。",
m4_p2:"網路外部性存在於產品對個人的價值取決於其他使用者數量的情況。電話是經典例子：一個人使用電話毫無價值，但當數百萬人都使用時，價值就巨大了。網路外部性創造正向回饋——一旦某技術取得市場領先，就會吸引更多使用者，形成贏家通吃的市場。",
m4_p3:"平台市場是數位技術加上網路或無線連接所創造的雙邊（甚至多邊）市場。作業系統是典型的平台：Microsoft Windows、Apple iOS 和 Google Android 在使用者之間創造直接外部性，在應用程式供應商之間創造間接外部性。平台戰爭的核心在於市場滲透率與價值擷取之間的權衡。",
m4_p4:"VCR 戰爭中，Sony 嚴格控制 Betamax 系統，而 JVC 將 VHS 廣泛授權，最終 VHS 以更大的市場滲透率獲勝。在 PC 市場，IBM 建立了主導平台，但 Intel 和 Microsoft 擷取了大部分價值。Apple 則選擇封閉控制以賺取高利潤，卻犧牲了市場主導地位。",
m4_cards:[
  {title:"公共標準",desc:"免費或低廉費用取得，如 Linux、GSM 行動電話標準"},
  {title:"私有標準",desc:"由企業擁有的技術和設計，如 Apple iOS、Intel x86"},
  {title:"網路外部性",desc:"產品價值隨使用者數量增加而提升的現象"},
  {title:"正向回饋與傾覆",desc:"市場領先者吸引更多使用者，形成贏家通吃局面"}
],

  {front:"Platform Strategy\n平台策略",back:"建立連接兩組或多組使用者的基礎設施，創造直接和間接網路外部性"}
],

m5_nav:"5. 組織創新與開放創新", m5_title:"組織創新與開放創新",
m5_p1:"發明是創造力的行為，而創新則需要合作與跨功能整合。創造力通常是個人行為——在概念或物件之間建立新的有意義關聯。但個人的創造力高度依賴組織環境：R&D 實驗室的生產力關鍵取決於工程師和科學家建立的溝通網路。",
m5_p2:"開放式創新（Open Innovation）是一種從組織內外尋求、利用和應用知識的創新方法。Henry Chesbrough 指出：在知識豐沛的世界中，並非所有聰明人都為你工作，因此你必須找到他們、與他們連結、並在他們的基礎上發展。P&G 的 Connect and Develop 計畫以及 IBM 的 Innovation Jam 都是開放式創新的卓越範例。",
m5_p3:"組織創新的關鍵機制包括：跨功能產品開發團隊、產品冠軍制度、以及企業孵化器。3M 公司有著悠久的產品冠軍傳統——讓個人提出創意、說服身邊的人、成為專案經理帶領團隊。Cisco 的新興技術事業群（EMTG）則在 18 個月內收集了 400 個新事業構想。",
m5_cards:[
  {title:"創造力組織條件",desc:"平等文化、自主空間、認可讚賞、多元化團隊與建設性衝突"},
  {title:"P&G Connect & Develop",desc:"70 位技術創業者搜尋外部創新，35% 新品源自公司外部"},
  {title:"IBM Innovation Jam",desc:"15 萬人參與 72 小時線上腦力激盪，預算 1 億美元開發 10 項新事業"},
  {title:"產品冠軍制度",desc:"讓創意發起者領導開發團隊，從發明一路帶到商業化"}
],
m5_terms:[
  {front:"Open Innovation\n開放式創新",back:"從組織內外尋求、利用和應用知識的方法——因為並非所有聰明人都在你的組織內"},
  {front:"Product Champion\n產品冠軍",back:"以個人承諾推動創新克服組織阻力的關鍵人物——Schön 指出新想法要不找到冠軍，要不就死去"},

],

m1_nav:"1. Innovation & Value Capture", m1_title:"Innovation Process & Value Capture",
m1_p1:"Invention is the creation of new products and processes through new knowledge or novel combinations of existing knowledge. Innovation is the initial commercialization of invention—by producing and marketing a new product or using a new production method. Once introduced, innovation diffuses: on the demand side through customer adoption, on the supply side through competitor imitation.",
m1_p2:"\"If a man can make a better mousetrap than his neighbor, the world will make a beaten path to his door.\" Yet inventors of new mousetraps are more likely to be found at bankruptcy courts than in millionaires' playgrounds.",
m1_p3:"The profitability of an innovation depends on the value created and the share the innovator can capture. The 'Regime of Appropriability' describes the conditions influencing value distribution, comprising four key components: property rights, tacitness and complexity of technology, lead time, and complementary resources.",
m1_p4:"In the aspartame case, innovator G.D. Searle captured most of the value. But in PCs, suppliers (Intel, Microsoft) and consumers were the primary beneficiaries. Different innovations lead to vastly different value distributions.",
m1_cards:[
  {title:"Patents",desc:"Exclusive rights to new products, processes, or designs; valid for 17 years in the US"},
  {title:"Trade Secrets",desc:"Modest legal protection for recipes, formulas, processes, and customer lists"},
  {title:"Lead Time",desc:"The window of opportunity for the innovator to build capabilities and market position"},
  {title:"Complementary Resources",desc:"Financial, manufacturing, marketing, and distribution resources needed for commercialization"}
],
m1_terms:[
  {front:"Regime of Appropriability",back:"The set of conditions determining how value created by innovation is distributed among innovators, followers, suppliers, and consumers"},
  {front:"Complementary Resources",back:"Diverse resources and capabilities needed to bring innovations to market, including financing, production, marketing, distribution, and service"},
  {front:"Tacit Knowledge",back:"Knowledge that cannot be codified in writing, making it difficult for competitors to imitate, like Intel's chip manufacturing processes"}
],

  {q:"Which is NOT a component of the appropriability regime?",opts:["Property rights","Lead time","Organization size","Complementary resources"],ans:2,exp:"The four components are: property rights, tacitness/complexity, lead time, and complementary resources."},

m2_nav:"2. Exploitation Strategies", m2_title:"Strategies to Exploit Innovation",
m2_p1:"How should a firm maximize returns on innovation? Several strategies are available: from licensing (least resource-intensive) to internal commercialization (most resource-intensive), with outsourcing, strategic alliances, and joint ventures in between.",
m2_p2:"Strategy choice depends on two factors: the innovation's characteristics and the firm's resources and capabilities. When innovation is protected by clear patents or copyrights, licensing is viable. But without proprietary technology, as when Steve Jobs developed Apple I, self-commercialization becomes the only option.",
m2_p3:"ARM licenses its microprocessor technology to over 200 semiconductor companies, while Dolby's sound-reduction licensing accounted for 82% of its 2014 revenues. Conversely, James Dyson created his own company after failing to interest any major appliance company in licensing his dual-cyclone vacuum cleaner technology.",
m2_cards:[
  {title:"Licensing",desc:"Low risk/return; faces risk of licensee lacking motivation or stealing the innovation"},
  {title:"Strategic Alliance",desc:"Flexible but loosely structured; requires collaborative management capability"},
  {title:"Joint Venture",desc:"Shares investment and risk; potential for culture clash and partner disagreement"},
  {title:"Internal Commercialization",desc:"Highest investment but greatest control; requires full complementary resources"}
],

  {front:"Strategic Window",back:"The period when a firm's resources and capabilities are aligned with available market opportunities; differs by firm"}
],

  {q:"Start-up firms typically prefer which strategy?",opts:["Large-scale internal commercialization","Licensing or alliances to access complementary resources","Taking all risks alone","Waiting for market maturity"],ans:1,exp:"Start-ups lack complementary resources and naturally gravitate toward licensing or alliances."},
  {q:"Panasonic and Tesla's 2014 joint venture aimed to?",opts:["Produce smartphones","Develop a lithium-ion battery Gigafactory","Launch satellites","Develop social media"],ans:1,exp:"Panasonic and Tesla formed a JV to develop a Gigafactory to produce lithium-ion batteries."}
],

m3_nav:"3. Leader vs Follower", m3_title:"Leader vs Follower",
m3_p1:"Is it better to lead or follow in emerging industries? The evidence is mixed: some products see the leader grab the prize, others see followers triumph. De Havilland pioneered jet airliners but Boeing won. SixDegrees.com pioneered social networking but Facebook conquered the world.",
m3_p2:"Optimal entry timing depends on a firm's resources and capabilities. Small tech firms may have no choice but to pioneer, while large firms like IBM can leverage their manufacturing, distribution, and reputation advantages to enter when the market matures. EMI introduced the world's first CT scanner, but GE's vast capabilities drove EMI out of the market.",
m3_p3:"Emerging industries face two uncertainty sources: technological uncertainty (unpredictability of tech evolution) and market uncertainty (unknown market size for new products). Firms can manage risk through cooperating with lead users, limiting risk exposure, maintaining flexibility, and pursuing multiple strategies.",
m3_cards:[
  {title:"First-Mover Advantages",desc:"Patent barriers, learning curve leadership, shaping standards, capturing mindshare"},
  {title:"Follower Advantages",desc:"Reduced uncertainty costs, leveraging mature infrastructure, learning from pioneer mistakes"},
  {title:"Technological Uncertainty",desc:"Unpredictability of technology evolution and dominant design selection"},
  {title:"Market Uncertainty",desc:"Unknown market size and growth rates for new products"}
],
m3_terms:[
  {front:"First-Mover Advantage",back:"Benefits of pioneering: patent protection, learning curve advantages, standard-setting, and market mindshare"},
  {front:"Strategic Window",back:"The period when a firm's resources align with market opportunities; small firms have early, short windows; large firms have later, longer ones"},
  {front:"Active Waiting",back:"Don Sull's strategy: monitoring market developments and assembling resources while preparing for large-scale entry"}
],
m3_q:[
  {q:"In which case did the leader ultimately win?",opts:["VCRs","Personal computers","Float glass","MP3 players"],ans:2,exp:"Pilkington was both the pioneer and ultimate winner in float glass."},
  {q:"IBM's PC market entry strategy was to?",opts:["Enter first","Wait for market maturity to leverage complementary resources","Completely abstain","Partner with Apple"],ans:1,exp:"IBM delayed entry until the market had developed to the point where its strengths could have maximum impact."},
  {q:"Why did EMI fail in the CT scanner market?",opts:["Poor technology","GE's superior technical and commercial capabilities","Patent expiration","Market disappeared"],ans:1,exp:"GE's vast technological and commercial capabilities overwhelmed EMI's first-mover advantage."},
  {q:"Which is NOT a strategy for managing emerging industry risk?",opts:["Cooperating with lead users","Taking on massive debt","Maintaining flexibility","Multiple strategies"],ans:1,exp:"Firms should avoid debt to lower financial leverage and reduce risk exposure."},
  {q:"Facebook relative to SixDegrees.com was a?",opts:["Leader","Follower","Simultaneous entrant","Unrelated"],ans:1,exp:"SixDegrees.com pioneered social networking; Facebook was the successful follower."},
  {q:"Twitter was originally what type of platform?",opts:["Social network","Podcasting platform","E-commerce","Gaming"],ans:1,exp:"Twitter (originally Odeo) was founded to develop a podcasting platform before pivoting."},
  {q:"Markides and Geroski argue followers' opportunity is to?",opts:["Copy pioneer's technology","Grow niche markets into mass markets","Lower prices","File more patents"],ans:1,exp:"Successful followers grow niche markets into mass markets by lowering cost and increasing quality."},
  {q:"Von Hippel's 'lead users' concept emphasizes?",opts:["High-volume buyers","Users providing market indicators and helping develop new products","Government customers","Competitors"],ans:1,exp:"Lead users provide leading market indicators, assist product development, and offer early cash flow."}
],

m4_nav:"4. Standards & Platforms", m4_title:"Standards, Platforms & Network Externalities",
m4_p1:"In the digital networked economy, more markets are subject to standards that play a vital role in ensuring compatibility. Owning a standard can be an unmatched source of competitive advantage. Microsoft's Windows, Intel's x86, and Apple's iTunes are prime examples of standards generating massive profits.",
m4_p2:"A network externality exists when the value of a product depends on the number of other users. The telephone is the classic example: talking to yourself has little value, but millions of connected users create enormous value. Network externalities create positive feedback—once a technology gains market leadership, it attracts more users, creating winner-takes-all markets.",
m4_p3:"Platform-based markets are two-sided (or multi-sided) markets created by digital technologies with network connectivity. Operating systems are quintessential platforms: Windows, iOS, and Android create direct externalities among users and indirect externalities among app suppliers. Platform wars center on the tradeoff between market penetration and value appropriation.",
m4_p4:"In the VCR war, Sony kept tight control of Betamax while JVC broadly licensed VHS—VHS won through greater market penetration. In PCs, IBM established the dominant platform but Intel and Microsoft captured most value. Apple chose closed control for high margins but sacrificed market dominance.",
m4_cards:[
  {title:"Public Standards",desc:"Freely or cheaply available, like Linux, GSM mobile phone standard"},
  {title:"Private Standards",desc:"Owned by companies, like Apple iOS, Intel x86"},
  {title:"Network Externalities",desc:"Product value increases as the number of users grows"},
  {title:"Positive Feedback & Tipping",desc:"Market leader attracts more users, creating winner-takes-all dynamics"}
],
m4_terms:[
  {front:"Network Externality",back:"Product value to an individual depends on the number of other users of the same product, as with telephones and social networks"},
  {front:"Tipping",back:"Once a certain threshold is reached, cumulative forces become unstoppable, rapidly converging the market into a winner-takes-all outcome"},
  {front:"Platform Strategy",back:"Building infrastructure connecting two or more user groups, creating direct and indirect network externalities"}
],
m4_q:[
  {q:"Which is NOT a source of network externalities?",opts:["Users linked in a network","Complementary product availability","Switching costs","Absolute product quality"],ans:3,exp:"Sources include user linkage, complement availability, and switching costs—not absolute quality."},
  {q:"Why did VHS win the VCR war?",opts:["Superior technology","JVC broadly licensed the system","Sony exited the market","Government intervention"],ans:1,exp:"JVC's broad licensing fueled greater market penetration for VHS."},
  {q:"Why does the QWERTY layout persist?",opts:["Fastest typing","Most advanced","Collective lock-in effect","Government mandate"],ans:2,exp:"QWERTY is the classic case of collective lock-in—even a superior Dvorak keyboard couldn't displace it."},
  {q:"Who captured most value in the PC market?",opts:["IBM","Apple","Intel and Microsoft","Dell"],ans:2,exp:"IBM built the dominant platform but Intel and Microsoft captured the most value by owning core standard technologies."},
  {q:"The core tradeoff in platform strategy is?",opts:["Cost vs quality","Speed vs accuracy","Market penetration vs value appropriation","Scale vs scope"],ans:2,exp:"Platform owners must balance maximizing market penetration with maximizing their own value capture."},
  {q:"Google Android is classified as?",opts:["Closed proprietary standard","Government-mandated standard","Open source standard","No standard"],ans:2,exp:"Android is open source—freely available for use, modification, and development."},
  {q:"Key resources for winning standards wars do NOT include?",opts:["Installed base control","IP rights","Brand reputation","Government subsidies"],ans:3,exp:"Shapiro and Varian emphasize installed base, IP rights, innovation capability, first-mover advantage, and brand."},
  {q:"What event triggered market tipping in Blu-ray vs HD-DVD?",opts:["Sony price cut","Government decision","Warner Brothers defecting to Sony camp","Technology breakthrough"],ans:2,exp:"Warner Brothers' defection to Sony was critical to the market tipping suddenly in Sony's favor."}
],

m5_nav:"5. Organizing & Open Innovation", m5_title:"Organizing & Open Innovation",
m5_p1:"Invention is an act of creativity, while innovation requires collaboration and cross-functional integration. Creativity is typically individual—establishing meaningful new relationships between concepts. But individual creativity depends heavily on the organizational environment: R&D lab productivity critically depends on communication networks among engineers and scientists.",
m5_p2:"Open Innovation seeks, exploits, and applies knowledge from both inside and outside the organization. Henry Chesbrough notes: \"In a world of abundant knowledge, not all smart people work for you, so you'd better find them, connect to them, and build upon what they can do.\" P&G's Connect and Develop and IBM's Innovation Jam are exemplary cases.",
m5_p3:"Key organizational innovation mechanisms include: cross-functional product development teams, product champions, and corporate incubators. 3M has a long tradition of product champions—individuals propose ideas, convince colleagues, become project managers. Cisco's EMTG collected 400 new business ideas within 18 months.",
m5_cards:[
  {title:"Creative Organization Conditions",desc:"Egalitarian culture, autonomy, recognition, diverse teams, and constructive conflict"},
  {title:"P&G Connect & Develop",desc:"70 technology entrepreneurs searching externally; 35% of new products from outside"},
  {title:"IBM Innovation Jam",desc:"150,000 participants in 72-hour online brainstorm; $100M budget for 10 new ventures"},
  {title:"Product Champion System",desc:"Idea originators lead development teams from invention through commercialization"}
],
m5_terms:[
  {front:"Open Innovation",back:"Seeking, exploiting, and applying knowledge from both inside and outside the organization—because not all smart people work for you"},
  {front:"Product Champion",back:"The committed individual who drives innovation past organizational resistance—Schön found that new ideas either find a champion or die"},
  {front:"Corporate Incubator",back:"Business development units nurturing internally-developed technologies into new ventures; must be closely linked to core business to succeed"}
],
m5_q:[

  {q:"Chesbrough's core open innovation idea is?",opts:["All innovation should be secret","In an abundant knowledge world, connect with external smart people","Only partner with universities","Reduce R&D spending"],ans:1,exp:"In a world of abundant knowledge, find external talent and build upon their capabilities."},
  {q:"Schön's key finding about product champions?",opts:["Champions don't matter","New ideas need a champion or they die","Management should make all decisions","Champions must be CEOs"],ans:1,exp:"Schön's study of 15 major innovations concluded: new ideas either find a champion or die."},
  {q:"The main structural difference between innovative and operating organizations?",opts:["Innovative ones are more bureaucratic","Innovative ones emphasize hierarchy","Innovative ones use flat, task-oriented teams","No difference"],ans:2,exp:"Innovative organizations need flat structures, task-oriented teams, and fuzzy boundaries."},

    if (action==='play'){
      if(ttsState==='paused'){window.speechSynthesis.resume();setTtsState('playing');return}
      window.speechSynthesis.cancel();
      const sep=lang==='zh'?'。 ':'. ';
      let texts=[];
      if(module===0){texts=[t.m0_title,t.m0_intro,t.m0_why,t.m0_why_desc,...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)].filter(Boolean)}

      else{const v=voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel')))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));if(v)utterance.voice=v;utterance.lang='en-GB'}
      utterance.onend=()=>setTtsState('idle');utterance.onerror=()=>setTtsState('idle');

    const totalTime=analytics.time.reduce((a,b)=>a+b,0);
    const totalClicks=analytics.clicks.reduce((a,b)=>a+b,0);

    const overallAcc=totalAnswered>0?((totalCorrect/totalAnswered)*100).toFixed(0)+'%':t.analytics_no_data;
    const canExport=studentInfo.group&&studentInfo.dept&&studentInfo.id&&studentInfo.name;
    return (

          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center border border-slate-200 dark:border-slate-700 shadow-sm"><div className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalTime}{t.analytics_sec}</div><div className="text-xs text-slate-500">{t.analytics_total_time}</div></div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center border border-slate-200 dark:border-slate-700 shadow-sm"><div className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{totalClicks}{t.analytics_times}</div><div className="text-xs text-slate-500">{t.analytics_total_clicks}</div></div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center border border-slate-200 dark:border-slate-700 shadow-sm"><div className="text-2xl font-black font-serif text-[#004030] dark:text-[#D8C3A5]">{overallAcc}</div><div className="text-xs text-slate-500">{t.analytics_overall_acc}</div></div>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-x-auto">
          <table className="w-full text-sm"><thead><tr className="border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900">
            <th className="text-left px-4 py-3">{t.analytics_module}</th><th className="text-right px-4 py-3">{t.analytics_time}</th><th className="text-right px-4 py-3">{t.analytics_clicks}</th><th className="text-right px-4 py-3">{t.analytics_correct_ans_total}</th>
          </tr></thead><tbody>{modulesList.map((m,i)=>(
            <tr key={i} className="border-b border-slate-100 dark:border-slate-700/50"><td className="px-4 py-2 font-medium">{m.title}</td><td className="text-right px-4 py-2">{analytics.time[i]}{t.analytics_sec}</td><td className="text-right px-4 py-2">{analytics.clicks[i]}{t.analytics_times}</td><td className="text-right px-4 py-2">{analytics.quizTotal[i]>0?`${analytics.quizCorrect[i]} / ${analytics.quizAnswered[i]} / ${analytics.quizTotal[i]}`:t.analytics_no_data}</td></tr>
          ))}</tbody></table>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
          <h3 className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label className="text-sm text-slate-500 block mb-1">{t.analytics_group}</label><select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s,group:e.target.value}))} className="w-full border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 bg-white dark:bg-slate-900 text-sm"><option value="">--</option>{t.group_options.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
            <div><label className="text-sm text-slate-500 block mb-1">{t.analytics_dept}</label><input placeholder={t.analytics_dept_ph} value={studentInfo.dept} onChange={e=>setStudentInfo(s=>({...s,dept:e.target.value}))} className="w-full border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 bg-white dark:bg-slate-900 text-sm"/></div>
            <div><label className="text-sm text-slate-500 block mb-1">{t.analytics_id}</label><input placeholder={t.analytics_id_ph} value={studentInfo.id} onChange={e=>setStudentInfo(s=>({...s,id:e.target.value}))} className="w-full border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 bg-white dark:bg-slate-900 text-sm"/></div>
            <div><label className="text-sm text-slate-500 block mb-1">{t.analytics_name}</label><input placeholder={t.analytics_name_ph} value={studentInfo.name} onChange={e=>setStudentInfo(s=>({...s,name:e.target.value}))} className="w-full border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 bg-white dark:bg-slate-900 text-sm"/></div>
          </div>
          <button onClick={exportCSV} disabled={!canExport} className="mt-4 px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 transition-all text-sm">{canExport?t.analytics_export_csv:t.analytics_fill_required}</button>
        </div>
      </div>
    );
  };

  const renderContent = () => {
    switch(module){
      case 0: return (
        <div className="space-y-8 text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
          <div className="bg-[#004030] dark:bg-slate-800 rounded-2xl p-6 sm:p-8 text-white">
            <p className="text-xs font-bold uppercase tracking-widest text-[#D8C3A5] mb-3">{lang==='zh'?'課程簡介':'Course Introduction'}</p>
            <h2 className="text-2xl sm:text-3xl md:text-4xl font-serif font-black text-white mb-4">{t.m0_title}</h2>
            <p className="text-[#D8C3A5]/90 text-base leading-relaxed">{t.m0_intro}</p>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border-l-4 border-[#D8C3A5] shadow-sm">
            <h3 className="text-xl font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
            <p className="text-base text-slate-600 dark:text-slate-400">{t.m0_why_desc}</p>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {t.m0_stats.map((s,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center shadow-sm border border-slate-200 dark:border-slate-700">
                <div className="text-2xl md:text-3xl font-black font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{s.val}</div>
                <div className="text-xs text-slate-500 dark:text-slate-400">{s.label}</div>
              </div>
            ))}
          </div>
          <div>
            <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{lang==='zh'?'課程模組':'Course Modules'}</h3>
            <div className="space-y-3">
              {t.m0_modules.map((m,i)=>(
                <button key={i} onClick={()=>setModule(i+1)} className="w-full flex items-center gap-5 bg-white dark:bg-slate-800 rounded-xl px-6 py-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group text-left">
                  <div className="text-3xl font-black font-serif text-[#D8C3A5] w-10 shrink-0">{m.num}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-1">{m.title}</div>
                    <div className="text-sm text-slate-500">{m.desc}</div>
                  </div>
                  <IconChevronRight size={20} className="text-slate-300 group-hover:text-[#004030] dark:group-hover:text-[#D8C3A5] transition-colors shrink-0"/>
                </button>
              ))}
            </div>
          </div>
          <div className="flex justify-end">
            <button onClick={()=>setModule(1)} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white rounded-lg shadow-md transition-all">{t.m0_start}</button>
          </div>
        </div>
      );
      case 1: case 2: case 3: case 4: case 5: return renderModule(module);
      case 6: return renderResources();
      case 7: return renderLab();
      case 8: return renderAnalytics();
      default: return null;
    }
  };

  return (
    <div className={`min-h-screen bg-[#f4f4f4] dark:bg-[#121212] font-sans flex flex-col overflow-x-hidden pt-16 selection:bg-[#004030] selection:text-white dark:selection:bg-[#D8C3A5] dark:selection:text-[#004030]`}>
      {/* Header */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="relative" ref={menuRef}>
              <button onClick={()=>setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors" aria-label="Toggle menu">{menuOpen?<IconX size={20}/>:<IconMenu size={20}/>}</button>
              {menuOpen&&(
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100] overflow-x-hidden">
                  <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-2 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
                  {modulesList.map(m=>(
                    <button key={m.id} onClick={()=>{setModule(m.id);setMenuOpen(false)}}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span>
                      <span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2 text-white hover:text-[#D8C3A5] transition-colors">
              <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest">{t.brand}</span>
              <span className="font-serif font-bold text-white text-sm hidden sm:inline">{t.title}</span>
            </button>
          </div>
          <div className="flex items-center gap-1 sm:gap-2">
            <div className="flex items-center gap-1 mr-1 sm:mr-2">
              {ttsState==='idle'&&<button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg" title={t.audio_read}><IconPlay size={16}/></button>}
              {ttsState==='playing'&&<><button onClick={()=>handleTTS('pause')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPause size={16}/></button><button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button></>}
              {ttsState==='paused'&&<><button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPlay size={16}/></button><button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button></>}
            </div>
            <button onClick={()=>{setLang(l=>l==='zh'?'en':'zh');window.speechSynthesis&&window.speechSynthesis.cancel();setTtsState('idle')}} className="px-2 py-1 text-xs sm:text-sm font-bold bg-white/10 hover:bg-white/20 rounded-lg transition-colors">{lang==='zh'?'EN':'中'}</button>
            <button onClick={()=>setIsDark(d=>!d)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg">{isDark?<IconSun size={18}/>:<IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>

      {/* Body */}
      <div className="flex-1 flex max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 py-6 gap-6">
        <aside className="hidden md:block w-64 shrink-0">
          <div className="sticky top-20 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
            <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700"><p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p></div>
            {modulesList.map(m=>(
              <button key={m.id} onClick={()=>setModule(m.id)} className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-left ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span>
                <span className="truncate">{m.title}</span>
              </button>
            ))}
          </div>
        </aside>
        <main className="flex-1 min-w-0" onClick={handleClick} ref={contentRef}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">
            {renderContent()}
            <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
              <button onClick={()=>setModule(Math.max(0,module-1))} disabled={module===0} className="px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 uppercase text-sm tracking-wider flex items-center transition-colors">← {t.nav_prev}</button>
              <button onClick={()=>setModule(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1} className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white disabled:opacity-0 uppercase text-sm tracking-wider shadow-md flex items-center transition-all">{t.nav_next} <IconArrowRight size={16} className="ml-2"/></button>
            </div>
          </div>
        </main>
      </div>

      {/* Footer */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3">
          <span className="flex items-center gap-1">Architect:&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a></span>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white transition-colors font-bold cursor-pointer">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
